services:
  - type: web
    name: jatai-whatsapp-backend
    runtime: docker
    rootDir: backend
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: SESSION_DIR
        value: /app/session
      - key: INTERNAL_TOKEN
        sync: false
