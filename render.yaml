services:
  - type: web
    name: jatai-app
    runtime: docker
    rootDir: .
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api
    autoDeploy: true
    envVars:
      - key: VITE_SUPABASE_URL
        value: https://bcafttsxvperfslgjphb.supabase.co
      - key: VITE_SUPABASE_PROJECT_ID
        value: bcafttsxvperfslgjphb
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjYWZ0dHN4dnBlcmZzbGdqcGhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5NzQwNTYsImV4cCI6MjA4MzU1MDA1Nn0.eaCDIVgdvm31TCK1qTnbdh-SNUw718UFAsGWd7ifvPc
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_BACKEND_URL
        value: https://kenia-whatsapp-backend.onrender.com

  - type: web
    name: kenia-whatsapp-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /api
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: INTERNAL_TOKEN
        sync: false
      - key: AUTH_DIR
        value: /opt/render/project/src/auth_session
